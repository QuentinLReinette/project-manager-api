---
services:
  mysql_db:
    image: mysql:8.0
    container_name: pm_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app_user", "-papp_password"]
      timeout: 5s
      retries: 5
      interval: 5s
    networks:
      - net_private

  api:
    image: golang:1.22-alpine
    container_name: pm_api
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - .:/go/src/app
    working_dir: /go/src/app
    environment:
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    command: go run cmd/api/main.go
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - net_private
      - net_public

networks:
  net_private:
    driver: bridge
    internal: true
  net_public:
    driver: bridge

volumes:
  mysql_data:
