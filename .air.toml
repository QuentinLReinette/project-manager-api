root = "."
tmp_dir = "/tmp/air"

[build]
  cmd = "CGO_ENABLED=0 GOOS=linux go build -o /tmp/air/main ./src/main.go"
  bin = "/tmp/air/main"
  
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "vendor", "testdata"]
  
  poll = true
  poll_interval = 500
  delay = 1000
  stop_on_error = false
  log = "air.log"
